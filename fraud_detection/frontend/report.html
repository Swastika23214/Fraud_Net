<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection Report</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
            background: #1e293b;
        }

        th, td {
            padding: 12px;
            border: 1px solid #334155;
        }

        th {
            background: #3b82f6;
        }

        tr:hover {
            background: #475569;
        }
    </style>
</head>

<body>

<h1>🚨 Fraud Detection Report</h1>

<table>
    <tr>
        <th>Phone Number</th>
        <th>Score</th>
        <th>Risk Level</th>
    </tr>

    <!-- Row 1 -->
    <tr>
        <td id="num1"></td>
        <td id="score1"></td>
        <td id="risk1"></td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td id="num2"></td>
        <td id="score2"></td>
        <td id="risk2"></td>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td id="num3"></td>
        <td id="score3"></td>
        <td id="risk3"></td>
    </tr>

</table>

<script>
let data = [
    {number: "9991110001", score: 90, risk: "High"},
    {number: "7773330003", score: 85, risk: "Medium"},
    {number: "8882220002", score: 75, risk: "Low"}
];

// Row 1
document.getElementById("num1").innerText = data[0].number;
document.getElementById("score1").innerText = data[0].score;
document.getElementById("risk1").innerText = data[0].risk;

// Row 2
document.getElementById("num2").innerText = data[1].number;
document.getElementById("score2").innerText = data[1].score;
document.getElementById("risk2").innerText = data[1].risk;

// Row 3
document.getElementById("num3").innerText = data[2].number;
document.getElementById("score3").innerText = data[2].score;
document.getElementById("risk3").innerText = data[2].risk;
</script>

</body>
</html>
